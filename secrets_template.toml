# Rail-Madad Configuration Template
# Copy this file to .streamlit/secrets.toml and replace the placeholder values with your actual API keys

[api_keys]
# Google Gemini API Key
# Get your free API key from: https://makersuite.google.com/app/apikey
GEMINI_API_KEY = "your_gemini_api_key_here"

# RapidAPI Key for Indian Railway IRCTC API  
# Get your API key from: https://rapidapi.com/rahilkhan224/api/indian-railway-irctc/playground
RAPID_API_KEY = "your_rapid_api_key_here"

# Serper API Key for Google Search
# Get your API key from: https://serper.dev/
SERPER_API_KEY = "your_serper_api_key_here"

[model]
# Gemini Model Name (you can use gemini-1.5-flash or gemini-1.5-pro)
GEMINI_MODEL_NAME = "gemini-1.5-flash"
